<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paket — Admin Koki Batak</title>
  <link rel="icon" href="../assets/logo.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>body { background: #f6f4f1; } .thumb-cell img { width: 56px; height: 56px; object-fit: cover; border-radius: 8px; }</style>
</head>
<body data-admin-page="paket">
  <div id="adminNav"></div>

  <main class="container-fluid px-3 px-md-4 py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <h1 class="h3 mb-0">Paket &amp; Menu</h1>
      <button class="btn text-white" style="background:#9e1b1b" id="addBtn">+ Tambah Paket</button>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr><th>Foto</th><th>Nama</th><th>Kategori</th><th>Harga</th><th>Diskon</th><th>Label</th><th>Aksi</th></tr>
            </thead>
            <tbody id="pkgBody"><tr><td colspan="7" class="text-center text-muted py-4">Memuat…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <datalist id="catList"></datalist>

  <!-- Modal form paket -->
  <div class="modal fade" id="pkgModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <form id="pkgForm">
          <div class="modal-header">
            <h5 class="modal-title" id="pkgModalTitle">Tambah Paket</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="id" />
            <div class="row g-3">
              <div class="col-md-8">
                <label class="form-label">Nama Paket <span class="text-danger">*</span></label>
                <input class="form-control" name="name" required />
              </div>
              <div class="col-md-4">
                <label class="form-label">SKU / Kode</label>
                <input class="form-control" name="sku" placeholder="opsional" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Kategori</label>
                <input class="form-control" name="category" list="catList" placeholder="mis. Paket Acara" />
              </div>
              <div class="col-md-3">
                <label class="form-label">Urutan</label>
                <input type="number" class="form-control" name="sort_order" value="100" />
              </div>
              <div class="col-md-3 d-flex align-items-end gap-3">
                <div class="form-check"><input class="form-check-input" type="checkbox" name="is_bestseller" id="isBest"><label class="form-check-label" for="isBest">Terlaris</label></div>
                <div class="form-check"><input class="form-check-input" type="checkbox" name="is_active" id="isActive" checked><label class="form-check-label" for="isActive">Aktif</label></div>
              </div>
              <div class="col-12">
                <label class="form-label">Deskripsi</label>
                <textarea class="form-control" name="description" rows="3"></textarea>
              </div>
              <div class="col-md-4">
                <label class="form-label">Harga (Rp) <span class="text-danger">*</span></label>
                <input type="number" class="form-control" name="price" min="0" required />
              </div>
              <div class="col-md-4">
                <label class="form-label">Harga Diskon (Rp)</label>
                <input type="number" class="form-control" name="discount_price" min="0" placeholder="kosongkan jika tidak ada" />
              </div>
              <div class="col-md-4">
                <label class="form-label">Label Diskon</label>
                <input class="form-control" name="discount_label" placeholder="mis. Promo" />
              </div>
              <div class="col-12">
                <label class="form-label">Foto Paket</label>
                <input type="file" class="form-control" id="imgFile" accept="image/*" />
                <div class="form-text">Pilih gambar untuk mengganti foto. Maks ~3 MB. Dikosongkan = foto lama dipakai.</div>
                <input type="hidden" name="image_drive_id" />
                <div class="mt-2"><img id="imgPreview" referrerpolicy="no-referrer" style="max-height:120px;border-radius:8px;display:none" alt="Pratinjau" /></div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
            <button type="submit" class="btn text-white" style="background:#9e1b1b" id="pkgSaveBtn">Simpan</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="js/admin-core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/admin-paket.js"></script>
</body>
</html>
