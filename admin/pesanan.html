<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pesanan — Admin Koki Batak</title>
  <link rel="icon" href="../assets/logo.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>body { background: #f6f4f1; }</style>
</head>
<body data-admin-page="pesanan">
  <div id="adminNav"></div>

  <main class="container-fluid px-3 px-md-4 py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <h1 class="h3 mb-0">Pesanan</h1>
      <div class="btn-group btn-group-sm" id="statusFilter" role="group"></div>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr><th>Kode</th><th>Pelanggan</th><th>No. HP</th><th>Total</th><th>Status</th><th>Tanggal</th><th></th></tr>
            </thead>
            <tbody id="ordersBody"><tr><td colspan="7" class="text-center text-muted py-4">Memuat…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal detail pesanan -->
  <div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Detail Pesanan <code id="mCode"></code></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="orderModalBody"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
          <button type="button" class="btn text-white" style="background:#9e1b1b" id="saveStatusBtn">Simpan Perubahan</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="js/admin-core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/admin-pesanan.js"></script>
</body>
</html>
