<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Admin Koki Batak</title>
  <link rel="icon" href="../assets/logo.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>body { background: #f6f4f1; }</style>
</head>
<body data-admin-page="dashboard">
  <div id="adminNav"></div>

  <main class="container-fluid px-3 px-md-4 py-4">
    <h1 class="h3 mb-4">Dashboard</h1>

    <div id="statsRow" class="row g-3 mb-4">
      <div class="col-12"><div class="text-center text-muted py-5"><div class="spinner-border"></div></div></div>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white fw-semibold">Pesanan Terbaru</div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr><th>Kode</th><th>Pelanggan</th><th>Total</th><th>Status</th><th>Tanggal</th></tr>
                </thead>
                <tbody id="recentBody"><tr><td colspan="5" class="text-center text-muted py-4">Memuat…</td></tr></tbody>
              </table>
            </div>
          </div>
          <div class="card-footer bg-white text-end"><a href="pesanan.html" class="btn btn-sm btn-outline-dark">Semua Pesanan →</a></div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white fw-semibold">Status Pesanan</div>
          <ul class="list-group list-group-flush" id="statusList">
            <li class="list-group-item text-muted">Memuat…</li>
          </ul>
        </div>
      </div>
    </div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="js/admin-core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/admin-dashboard.js"></script>
</body>
</html>
