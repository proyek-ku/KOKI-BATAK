<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin — Koki Batak</title>
  <link rel="icon" href="../assets/logo.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: linear-gradient(135deg, #9e1b1b, #771212); min-height: 100vh; display: flex; align-items: center; }
    .login-card { max-width: 400px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card login-card mx-auto shadow-lg border-0">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <img src="../assets/logo.png" alt="Koki Batak" height="72" onerror="this.style.display='none'" />
          <h1 class="h4 mt-3 mb-1">Panel Admin</h1>
          <p class="text-muted small mb-0">Koki Batak Catering</p>
        </div>

        <div id="expiredAlert" class="alert alert-warning d-none" role="alert">
          Sesi Anda telah berakhir. Silakan masuk kembali.
        </div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input type="text" class="form-control form-control-lg" id="username" autocomplete="username" autocapitalize="none" spellcheck="false" placeholder="mis. admin" required />
            <div class="invalid-feedback">Masukkan username.</div>
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-control form-control-lg" id="password" autocomplete="current-password" required />
            <div class="invalid-feedback">Masukkan password.</div>
          </div>
          <button type="submit" class="btn btn-lg w-100 text-white" style="background:#9e1b1b" id="loginBtn">Masuk</button>
        </form>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="js/admin-core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/admin-login.js"></script>
</body>
</html>
