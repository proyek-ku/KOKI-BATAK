<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeri — Admin Koki Batak</title>
  <link rel="icon" href="../assets/logo.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>body { background: #f6f4f1; } .g-thumb { aspect-ratio: 1/1; object-fit: cover; width: 100%; border-radius: 10px 10px 0 0; }</style>
</head>
<body data-admin-page="galeri">
  <div id="adminNav"></div>

  <main class="container-fluid px-3 px-md-4 py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <h1 class="h3 mb-0">Galeri</h1>
      <button class="btn text-white" style="background:#9e1b1b" id="addBtn">+ Tambah Foto</button>
    </div>

    <div class="row g-3" id="galleryGrid">
      <div class="col-12 text-center text-muted py-5"><div class="spinner-border"></div></div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal fade" id="galModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="galForm">
          <div class="modal-header">
            <h5 class="modal-title" id="galTitle">Tambah Foto</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="id" />
            <input type="hidden" name="image_drive_id" />
            <div class="mb-3">
              <label class="form-label">Judul</label>
              <input class="form-control" name="title" placeholder="opsional" />
            </div>
            <div class="mb-3">
              <label class="form-label">Keterangan</label>
              <input class="form-control" name="caption" placeholder="opsional" />
            </div>
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label">Urutan</label>
                <input type="number" class="form-control" name="sort_order" value="100" />
              </div>
              <div class="col-6 d-flex align-items-end">
                <div class="form-check"><input class="form-check-input" type="checkbox" name="is_active" id="gActive" checked><label class="form-check-label" for="gActive">Tampilkan</label></div>
              </div>
            </div>
            <div class="mb-2">
              <label class="form-label">Foto</label>
              <input type="file" class="form-control" id="gFile" accept="image/*" />
              <div class="form-text">Maks ~3 MB.</div>
            </div>
            <img id="gPreview" referrerpolicy="no-referrer" style="max-height:140px;border-radius:8px;display:none" alt="Pratinjau" />
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
            <button type="submit" class="btn text-white" style="background:#9e1b1b" id="gSaveBtn">Simpan</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="js/admin-core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/admin-galeri.js"></script>
</body>
</html>
