<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kelola Admin — Koki Batak</title>
  <link rel="icon" href="../assets/logo.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>body { background: #f6f4f1; }</style>
</head>
<body data-admin-page="admin">
  <div id="adminNav"></div>

  <main class="container-fluid px-3 px-md-4 py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <h1 class="h3 mb-0">Kelola Admin</h1>
      <button class="btn text-white" style="background:#9e1b1b" id="addBtn">+ Tambah Admin</button>
    </div>

    <div id="notOwner" class="alert alert-warning d-none">Halaman ini hanya untuk Owner.</div>

    <div class="card shadow-sm border-0" id="tableCard">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr><th>Nama</th><th>Username</th><th>Peran</th><th>Status</th><th>Aksi</th></tr>
            </thead>
            <tbody id="adminBody"><tr><td colspan="5" class="text-center text-muted py-4">Memuat…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal form admin -->
  <div class="modal fade" id="adminModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="adminForm">
          <div class="modal-header">
            <h5 class="modal-title" id="adminModalTitle">Tambah Admin</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="id" />
            <div class="mb-3">
              <label class="form-label">Nama</label>
              <input class="form-control" name="name" placeholder="Nama lengkap" />
            </div>
            <div class="mb-3">
              <label class="form-label">Username <span class="text-danger">*</span></label>
              <input class="form-control" name="username" autocapitalize="none" spellcheck="false" placeholder="huruf kecil, angka, . _" required />
              <div class="form-text">3-20 karakter. Dipakai untuk login.</div>
            </div>
            <div class="row g-3">
              <div class="col-7">
                <label class="form-label">Peran</label>
                <select class="form-select" name="role">
                  <option value="staff">Staff (kelola konten)</option>
                  <option value="owner">Owner (kelola admin juga)</option>
                </select>
              </div>
              <div class="col-5 d-flex align-items-end">
                <div class="form-check"><input class="form-check-input" type="checkbox" name="is_active" id="aActive" checked><label class="form-check-label" for="aActive">Aktif</label></div>
              </div>
            </div>
            <div class="mb-1 mt-3">
              <label class="form-label">Password <span class="text-danger" id="pwReq">*</span></label>
              <input type="password" class="form-control" name="password" autocomplete="new-password" />
              <div class="form-text" id="pwHint">Minimal 8 karakter.</div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
            <button type="submit" class="btn text-white" style="background:#9e1b1b" id="adminSaveBtn">Simpan</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="js/admin-core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/admin-admin.js"></script>
</body>
</html>
