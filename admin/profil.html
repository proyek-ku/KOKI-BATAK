<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil — Admin Koki Batak</title>
  <link rel="icon" href="../assets/logo.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>body { background: #f6f4f1; }</style>
</head>
<body data-admin-page="profil">
  <div id="adminNav"></div>

  <main class="container px-3 px-md-4 py-4" style="max-width:680px">
    <h1 class="h3 mb-4">Profil Saya</h1>

    <div class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <h2 class="h6 text-muted mb-3">Informasi Akun</h2>
        <div class="row g-2" id="meInfo">
          <div class="col-12 text-muted">Memuat…</div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-body">
        <h2 class="h6 text-muted mb-3">Ganti Password</h2>
        <form id="pwForm" novalidate>
          <div class="mb-3">
            <label class="form-label">Password Lama</label>
            <input type="password" class="form-control" name="current_password" autocomplete="current-password" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password Baru</label>
            <input type="password" class="form-control" name="new_password" autocomplete="new-password" required />
            <div class="form-text">Minimal 8 karakter.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Ulangi Password Baru</label>
            <input type="password" class="form-control" name="confirm_password" autocomplete="new-password" required />
          </div>
          <button type="submit" class="btn text-white" style="background:#9e1b1b" id="pwBtn">Simpan Password Baru</button>
        </form>
      </div>
    </div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="js/admin-core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/admin-profil.js"></script>
</body>
</html>
