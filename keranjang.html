<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keranjang &amp; Pemesanan — Koki Batak</title>
  <meta name="description" content="Selesaikan pesanan catering Koki Batak Anda. Isi data acara, lalu konfirmasi langsung via WhatsApp." />
  <link rel="icon" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body data-page="keranjang">
  <header id="site-nav"></header>

  <main>
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow">Keranjang</span>
        <h1>Selesaikan Pesanan Anda</h1>
        <p>Periksa pesanan, lengkapi data acara, lalu kirim ke kami melalui WhatsApp.</p>
      </div>
    </section>

    <section class="section">
      <div class="container" id="checkoutWrap">
        <!-- Diisi oleh keranjang.js: layout keranjang+form ATAU layar sukses -->
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <!-- Template layar sukses (dipakai keranjang.js) -->
  <template id="successTpl">
    <div class="card success-box reveal">
      <div class="check">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5" /></svg>
      </div>
      <h2>Pesanan Tercatat!</h2>
      <p class="text-muted">Kode pesanan Anda:</p>
      <div class="code-pill" data-code></div>
      <p>Langkah terakhir: kirim detail pesanan ke admin kami melalui WhatsApp untuk konfirmasi ketersediaan dan pembayaran.</p>
      <a class="btn btn-wa btn-lg" data-wa target="_blank" rel="noopener">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.4A10 10 0 1 0 12 2zm5.3 14.1c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .1-1.7-.1-.4-.1-.9-.3-1.6-.6-2.8-1.2-4.6-4-4.7-4.2-.1-.2-1.1-1.5-1.1-2.8 0-1.3.7-2 .9-2.2.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 1.9c.1.2.1.4 0 .5l-.4.6c-.1.2-.3.3-.1.6.1.3.7 1.1 1.5 1.8 1 .9 1.8 1.1 2.1 1.3.2.1.4.1.5-.1l.7-.8c.2-.2.4-.2.6-.1l1.8.9c.2.1.4.2.4.3.1.1.1.6-.1 1.2z" /></svg>
        Lanjut ke WhatsApp
      </a>
      <p class="text-muted mt-4" style="font-size:.85rem">
        Jika WhatsApp tidak terbuka otomatis, tekan tombol di atas.
      </p>
      <p class="mt-4"><a href="menu.html">&larr; Kembali ke menu</a></p>
    </div>
  </template>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/keranjang.js"></script>
</body>
</html>
